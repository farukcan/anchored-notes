<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anchored Notes</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 12px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        font-size: 13px;
        color: #222;
      }
      h1 { font-size: 14px; margin: 0 0 10px; }
      button.primary {
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 4px;
        background: #e7d23c;
        cursor: pointer;
        font-weight: 600;
      }
      button.primary:hover { background: #d8c22f; }
      .count { margin: 10px 0 4px; color: #666; }
      ul { list-style: none; margin: 0; padding: 0; max-height: 220px; overflow: auto; }
      li {
        padding: 6px 8px;
        border-radius: 4px;
        background: #f4f4f4;
        margin-bottom: 4px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
      li .scope { color: #888; font-size: 11px; white-space: nowrap; }
      .text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      a { display: inline-block; margin-top: 8px; color: #1a73e8; text-decoration: none; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>⚓ Anchored Notes</h1>
    <button id="add" class="primary">⚓ Add note to this page</button>
    <div class="count" id="count"></div>
    <ul id="list"></ul>
    <a id="options" href="#">Manage all notes →</a>
    <script src="popup.js"></script>
  </body>
</html>
