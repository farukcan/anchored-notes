<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anchored Notes — Options</title>
    <style>
      body {
        max-width: 880px;
        margin: 24px auto;
        padding: 0 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        color: #222;
      }
      h1 { font-size: 18px; margin: 0; }
      .head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
      .lang { position: relative; }
      .lang-btn {
        border: none;
        background: transparent;
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        padding: 2px 4px;
        border-radius: 4px;
      }
      .lang-btn:hover { background: #f0f0f0; }
      .lang-menu {
        position: absolute;
        top: 100%;
        right: 0;
        margin-top: 4px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-shadow: 0 4px 12px #0002;
        padding: 4px;
        z-index: 10;
        min-width: 120px;
      }
      .lang-menu[hidden] { display: none; }
      .lang-item {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        border: none;
        background: transparent;
        cursor: pointer;
        padding: 6px 8px;
        border-radius: 4px;
        font-size: 13px;
        text-align: left;
      }
      .lang-item:hover { background: #f4f4f4; }
      .lang-item[aria-current="true"] { font-weight: 600; }
      .usage { color: #666; font-size: 13px; margin-bottom: 8px; }
      .usage.limit { color: #c0392b; font-weight: 600; }
      .toolbar { display: flex; gap: 8px; align-items: center; margin: 16px 0; flex-wrap: wrap; }
      input[type="search"] { flex: 1; min-width: 180px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; }
      button { padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; background: #fafafa; cursor: pointer; }
      button:hover { background: #f0f0f0; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; vertical-align: top; }
      th { color: #666; font-weight: 600; }
      .anchor { color: #888; font-size: 12px; word-break: break-all; }
      .empty { color: #888; padding: 24px 0; }
      .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 50%; border: 1px solid #0002; margin-right: 6px; vertical-align: middle; }
      .title { cursor: pointer; }
      tr:hover .title { color: #000; text-decoration: underline; }
      .detail td { background: #fafafa; }
      .detail .content { white-space: pre-wrap; word-break: break-word; font-size: 13px; color: #333; }
      .account { display: flex; align-items: center; gap: 8px; margin: 12px 0; min-height: 28px; }
      .account-email { color: #444; font-size: 13px; }
      .plan-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.03em; }
      .plan-badge.plan-free { background: #ececec; color: #666; }
      .plan-badge.plan-pro { background: #e7d23c; color: #5a4d00; }
      .account-signin { padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-weight: 600; }
      .account-signin:hover { background: #f6f6f6; }
      .account-signin:disabled { color: #999; cursor: default; }
      .account-signout { border: none; background: transparent; color: #1a73e8; cursor: pointer; font-size: 13px; padding: 2px 4px; }
      .account-signout:hover { text-decoration: underline; }
      .account-upgrade { border: 1px solid #d4c02f; background: #f6e14a; color: #5a4d00; cursor: pointer; font-size: 13px; font-weight: 600; padding: 6px 12px; border-radius: 4px; }
      .account-upgrade:hover { background: #f0d81f; }
      .account-upgrade:disabled { opacity: 0.6; cursor: default; }
      .account-billing { border: none; background: transparent; color: #1a73e8; cursor: pointer; font-size: 13px; padding: 2px 4px; }
      .account-billing:hover { text-decoration: underline; }
      .account-billing:disabled { color: #999; cursor: default; }
      .account-delete { margin-left: auto; border: 1px solid #e0b4b4; background: #fff; color: #c0392b; cursor: pointer; font-size: 13px; padding: 6px 12px; border-radius: 4px; }
      .account-delete:hover { background: #fdecea; }
      .encryption { display: flex; align-items: center; gap: 8px; margin: 12px 0; font-size: 13px; flex-wrap: wrap; min-height: 0; }
      .enc-status { color: #666; }
      .enc-required { color: #c0392b; font-weight: 600; }
      .enc-error { color: #c0392b; font-size: 12px; }
      .enc-action { border: none; background: transparent; color: #1a73e8; cursor: pointer; font-size: 13px; padding: 2px 4px; }
      .enc-action:hover { text-decoration: underline; }
      .enc-action:disabled { color: #999; cursor: default; text-decoration: none; }
      .enc-password { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; }
      .enc-unlock { padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; background: #fafafa; cursor: pointer; }
      .enc-unlock:disabled { color: #999; cursor: default; }
    </style>
  </head>
  <body>
    <div class="head">
      <h1>⚓ Anchored Notes</h1>
      <div class="lang">
        <button id="lang-btn" class="lang-btn" type="button"></button>
        <div id="lang-menu" class="lang-menu" hidden></div>
      </div>
    </div>
    <div class="account" id="account"></div>
    <div class="encryption" id="encryption"></div>
    <div class="usage" id="usage"></div>
    <div class="toolbar">
      <input type="search" id="search" />
      <button id="export"></button>
      <button id="import"></button>
      <input type="file" id="file" accept="application/json" hidden />
    </div>
    <table>
      <thead>
        <tr>
          <th id="col-note"></th>
          <th id="col-scope"></th>
          <th id="col-anchor"></th>
          <th id="col-created"></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" hidden></div>
    <script src="options.js"></script>
  </body>
</html>
