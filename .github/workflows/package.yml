name: Package extension

on:
  push:
    branches: [main]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: anchored-notes
          path: anchored-notes-*.zip
          if-no-files-found: error
