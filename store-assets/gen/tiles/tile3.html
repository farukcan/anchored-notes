<!doctype html>
<html lang="{{lang}}" dir="{{dir}}">
<head>
<meta charset="utf-8">
<link href="{{fontHref}}" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
  :root { --font-head: {{fontHead}}; --font-body: {{fontBody}}; }
  .copy { position: absolute; top: 112px; left: 0; right: 0; text-align: center; z-index: 4; }
  h1 { font-size: 54px; max-width: 980px; margin: 0 auto; }
  h1 .hl { background: var(--pink); box-shadow: 0 2px 0 #eda8c6; }
  .copy .sub { margin-top: 22px; }
  .cards { position: absolute; left: 0; right: 0; top: 372px; display: flex; justify-content: center; gap: 40px; z-index: 3; }
  .card {
    width: 300px; height: 264px; padding: 30px 28px 26px;
    border-radius: 4px; position: relative;
    box-shadow: 0 24px 48px -16px rgba(43, 32, 16, 0.38), 0 4px 12px rgba(43,32,16,0.1);
  }
  .card .tape { top: -13px; left: 102px; width: 92px; }
  .card svg { width: 46px; height: 46px; margin-bottom: 18px; }
  .card h2 { font-family: var(--font-head); font-weight: 700; font-size: 23px; margin-bottom: 10px; }
  .card p { font-size: 17px; line-height: 1.5; color: #00000099; }
  .k1 { background: var(--yellow); transform: rotate(-1.8deg); }
  .k2 { background: var(--blue); transform: rotate(0.9deg); top: 14px; }
  .k3 { background: var(--purple); transform: rotate(-1deg); }
  .fold {
    position: absolute; right: 0; bottom: 0; width: 26px; height: 26px;
    background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.22) 50%);
  }
</style>
</head>
<body>
  <div class="wordmark"><img src="../../../icons/icon-128.png" alt="">Anchored Notes</div>

  <div class="copy">
    <h1>{{t3h1}}</h1>
    <p class="sub">{{t3sub}}</p>
  </div>

  <div class="cards">
    <div class="card k1">
      <div class="tape"></div><div class="fold"></div>
      <svg viewBox="0 0 48 48" fill="none" stroke="#241d13" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 21a14 14 0 0 1 25-5"/>
        <path d="M37 8v8h-8"/>
        <path d="M37 27a14 14 0 0 1-25 5"/>
        <path d="M11 40v-8h8"/>
      </svg>
      <h2>{{k1h}}</h2>
      <p>{{k1p}}</p>
    </div>
    <div class="card k2">
      <div class="tape"></div><div class="fold"></div>
      <svg viewBox="0 0 48 48" fill="none" stroke="#15324f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <rect x="10" y="20" width="28" height="20" rx="4"/>
        <path d="M16 20v-5a8 8 0 0 1 16 0v5"/>
        <circle cx="24" cy="30" r="2.6" fill="#15324f"/>
      </svg>
      <h2>{{k2h}}</h2>
      <p>{{k2p}}</p>
    </div>
    <div class="card k3">
      <div class="tape"></div><div class="fold"></div>
      <svg viewBox="0 0 48 48" fill="none" stroke="#2f2350" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="24" cy="24" r="16"/>
        <path d="M8 24h32M24 8c5 4.5 7.5 10 7.5 16S29 35.5 24 40c-5-4.5-7.5-10-7.5-16S19 12.5 24 8z"/>
      </svg>
      <h2>{{k3h}}</h2>
      <p>{{k3p}}</p>
    </div>
  </div>
</body>
</html>
