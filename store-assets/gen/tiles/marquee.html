<!doctype html>
<html lang="{{lang}}" dir="{{dir}}">
<head>
<meta charset="utf-8">
<link href="{{fontHref}}" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
  :root { --font-head: {{fontHead}}; --font-body: {{fontBody}}; }
  html, body { width: 1400px; height: 560px; }
  .wordmark { top: 44px; left: 64px; }
  [dir="rtl"] .wordmark { left: auto; right: 64px; }
  .copy { position: absolute; top: 138px; left: 64px; width: 490px; z-index: 4; }
  [dir="rtl"] .copy { left: auto; right: 64px; }
  h1 { font-size: 46px; }
  h1 .hl { background: var(--yellow); box-shadow: 0 2px 0 #e3d340; }
  .copy .sub { margin-top: 22px; width: 440px; font-size: 20px; }
  .scopes { position: absolute; left: 64px; bottom: 48px; display: flex; gap: 12px; z-index: 4; }
  [dir="rtl"] .scopes { left: auto; right: 64px; }
  .chip {
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    font-size: 14px; font-weight: 600; color: var(--ink);
    padding: 8px 14px; border-radius: 8px;
    box-shadow: 0 3px 8px rgba(43,32,16,0.18);
  }
  .chip small { display: block; font-weight: 400; font-size: 11px; color: #00000088; margin-top: 1px; }
  .c1 { background: var(--yellow); transform: rotate(-1.6deg); }
  .c2 { background: var(--blue);   transform: rotate(1.2deg); }
  .c3 { background: var(--purple); transform: rotate(-0.8deg); }
  .c4 { background: var(--pink);   transform: rotate(1.6deg); }
  .shot {
    position: absolute; top: 84px; left: 640px; width: 716px; z-index: 3;
    transform: rotate(-1.2deg);
  }
  [dir="rtl"] .shot { left: 44px; }
  .shot .tape { top: -13px; left: 64px; transform: rotate(-5deg); z-index: 6; }
  /* Full-width page view (no crop); the frame bleeds off the bottom edge. */
  .viewport { width: 716px; height: 448px; overflow: hidden; position: relative; }
  .viewport img { width: 716px; }
</style>
</head>
<body>
  <div class="wordmark"><img src="../../../icons/icon-128.png" alt="">Anchored Notes</div>

  <div class="copy">
    <h1>{{t1h1}}</h1>
    <p class="sub">{{t1sub}}</p>
  </div>

  <div class="scopes">
    <div class="chip c1">{{chip1}}<small>{{chip1s}}</small></div>
    <div class="chip c2">{{chip2}}<small>{{chip2s}}</small></div>
    <div class="chip c3">{{chip3}}<small>{{chip3s}}</small></div>
    <div class="chip c4">{{chip4}}<small>{{chip4s}}</small></div>
  </div>

  <div class="shot">
    <div class="tape"></div>
    <div class="browser">
      <div class="bar">
        <span class="dot" style="background:#ff5f57"></span>
        <span class="dot" style="background:#febc2e"></span>
        <span class="dot" style="background:#28c840"></span>
        <span class="url">theslowroute.com/journal/kyoto</span>
      </div>
      <div class="viewport"><img src="{{raw}}/hero.png" alt=""></div>
    </div>
  </div>
</body>
</html>
