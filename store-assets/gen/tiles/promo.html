<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,560;0,9..144,700;1,9..144,460&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 440px; height: 280px; overflow: hidden; }
  body {
    position: relative; background: #f6f0e3; color: #241d13;
    font-family: "Newsreader", Georgia, serif; -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(90% 80% at 80% 15%, #ffffff77 0%, transparent 60%),
      radial-gradient(rgba(36,29,19,0.05) 1px, transparent 1px);
    background-size: auto, 20px 20px;
  }
  .wordmark {
    position: absolute; top: 22px; left: 24px; z-index: 5;
    display: flex; align-items: center; gap: 9px;
    font-family: "Fraunces", Georgia, serif; font-weight: 700; font-size: 15px;
  }
  .wordmark img { width: 22px; height: 22px; border-radius: 5px; box-shadow: 0 1px 4px #0002; }
  h1 {
    position: absolute; left: 24px; top: 74px; width: 230px; z-index: 4;
    font-family: "Fraunces", Georgia, serif; font-weight: 560;
    font-size: 31px; line-height: 1.1; letter-spacing: -0.01em;
  }
  h1 .hl { background: #fcee5f; padding: 0 6px 2px; border-radius: 4px; box-shadow: 0 1px 0 #e3d340; }
  .sub {
    position: absolute; left: 24px; bottom: 30px; width: 220px;
    font-size: 14.5px; line-height: 1.45; color: #6f6350; z-index: 4;
  }
  .note {
    position: absolute; right: -14px; top: 58px; width: 190px; height: 186px;
    background: #fcee5f; transform: rotate(3deg); z-index: 3;
    box-shadow: 0 16px 30px -10px rgba(43,32,16,0.4);
  }
  .note .head { height: 26px; background: #e7d23c; }
  .note .body { padding: 12px 14px; font-family: -apple-system, "Helvetica Neue", sans-serif; font-size: 12.5px; font-weight: 600; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .box { width: 13px; height: 13px; border-radius: 3px; border: 1.6px solid #00000055; background: #fff; flex: none; }
  .box.on { background: #2f7cf6; border-color: #2f7cf6; position: relative; }
  .box.on::after { content: ""; position: absolute; left: 3.5px; top: 0.5px; width: 3.5px; height: 7px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(42deg); }
  .row s { color: #00000077; }
  .fold { position: absolute; right: 0; bottom: 0; width: 20px; height: 20px; background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.24) 50%); }
  .tape {
    position: absolute; width: 74px; height: 20px; top: -10px; left: 56px;
    background: rgba(222,186,106,0.55); box-shadow: 0 1px 3px #0002; border-radius: 2px;
    transform: rotate(-4deg); z-index: 6;
  }
</style>
</head>
<body>
  <div class="wordmark"><img src="../../../icons/icon-128.png" alt="">Anchored Notes</div>
  <h1>Sticky notes that <span class="hl">stay</span> on the page</h1>
  <p class="sub">Anchor a note to a page, a site, a tab — or everywhere.</p>
  <div class="note">
    <div class="tape"></div>
    <div class="head"></div>
    <div class="body">
      <div class="row"><span class="box on"></span><s>Book flights</s></div>
      <div class="row"><span class="box"></span>Reserve hotel</div>
      <div class="row"><span class="box"></span>Museum tickets</div>
      <div class="row"><span class="box"></span>Pack ⛩️</div>
    </div>
    <div class="fold"></div>
  </div>
</body>
</html>
